<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1814">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Café </> · Capítulos</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pagina-capitulos">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-group">
        <a href="index.html" class="logo-back">← Inicio</a>
        <span class="logo-icon">☕</span>
        <div>
          <h1 class="logo-title">Café <span class="logo-code">&lt;/&gt;</span></h1>
          <p class="logo-sub">Biblioteca de capítulos</p>
        </div>
      </div>
      <div class="header-badges">
        <span class="badge badge-html">HTML</span>
        <span class="badge badge-css">CSS</span>
        <span class="badge badge-js">JS</span>
      </div>
    </div>
  </header>

  <!-- BIBLIOTECA -->
  <main class="biblioteca">

    <!-- INTRO -->
    <div class="biblioteca-intro">
      <h2 class="biblioteca-titulo">Elige un capítulo</h2>
      <p class="biblioteca-desc">Cada capítulo agrupa lecciones de un tema. Conforme aprendas se irán desbloqueando más.</p>
    </div>

    <!-- TEMAS — se generan desde script.js -->
    <div id="temasContainer"></div>

  </main>

  <footer class="site-footer">
    <p>☕ Café &lt;/&gt; · Hecho con paciencia y analogías</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
